<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="_top">
    <title>Sign Up - Playbook MPR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }

        .header {
            padding: 40px 30px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo-img {
            max-width: 192px;
            height: auto;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #888;
        }

        .form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00A854;
            box-shadow: 0 0 0 3px rgba(0, 168, 84, 0.1);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #00A854;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #009249;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 168, 84, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(0, 168, 84, 0.1);
            color: #00A854;
            border: 1px solid rgba(0, 168, 84, 0.3);
        }

        .message.error {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1a1a1a;
        }

        .footer p {
            color: #555;
            font-size: 12px;
        }

        .footer a {
            color: #00A854;
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }
            .header {
                padding: 30px 20px;
            }
            .form {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://raw.githubusercontent.com/sskmusic7/Molteesha-commits/main/images/white%20logo.png" alt="Playbook MPR Logo" class="logo-img" onerror="this.style.display='none'">
            <h1>Sign Up</h1>
            <p>Get exclusive updates delivered to your inbox</p>
        </div>

        <form id="signup-form" class="form">
            <div id="message" class="message"></div>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="+44 7XXX XXX XXX">
            </div>

            <div class="form-group">
                <label for="interest">Interested In</label>
                <select id="interest" name="interest">
                    <option value="">Select an option</option>
                    <option value="Website Development">Website Development</option>
                    <option value="Hosting & Maintenance">Hosting & Maintenance</option>
                    <option value="AI Voice Agents">AI Voice Agents</option>
                    <option value="AI Newsletters">AI Newsletters</option>
                    <option value="Social Media Automation">Social Media Automation</option>
                    <option value="Media Content Editing">Media Content Editing</option>
                    <option value="Personal Chatbots">Personal Chatbots</option>
                    <option value="Brand Identity">Brand Identity</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                Sign Up
            </button>
        </form>

        <div class="footer">
            <p>Powered by <a href="https://playbookmpr.com" target="_blank">Playbook MPR</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name || !email) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

            const formData = {
                name: name,
                email: email,
                phone: document.getElementById('phone').value.trim(),
                interest: document.getElementById('interest').value
            };

            google.script.run
                .withSuccessHandler(function(response) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign Up';

                    if (response && response.status === 'success') {
                        showMessage('Thank you for signing up!', 'success');
                        form.reset();
                    } else {
                        showMessage('Something went wrong. Please try again.', 'error');
                    }
                })
                .withFailureHandler(function(error) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign Up';
                    showMessage('Something went wrong. Please try again.', 'error');
                    console.error('Error:', error);
                })
                .submitForm(formData);
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
